<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>Tarefas</title>

</head>

<body>

    <!-- Container principal -->
    <div class="container">

        <!-- Card de tarefas-->
        <div class="card">

            <h1>Minhas Tarefas</h1>

            <!-- Input de tarefas -->
            <div class="input-group">

                <input type="text" id="task-input" placeholder="O que precisa ser feito?" />

                <!-- Botão adicionar -->
                <button id="add-btn" class="btn-add">
                    Adicionar
                </button>

            </div>

             <!-- Listagem de tarefas-->
            <div class="list-section">

                <h2>Listagem</h2>

                <ul id="task-list"></ul>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
    
</body>

</html>
